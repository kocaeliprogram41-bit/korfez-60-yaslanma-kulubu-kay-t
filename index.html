<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>+60 Yaş Yaşlanma Kulübü</title>

<style>
body{
font-family:Segoe UI;
background:url("kulüp.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:right;
align-items:center;
min-height:100vh;
margin:0;
}

.form-container{
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:40px;
width:100%;
max-width:500px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#2f4f6f;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
background:#f0f4f9;
}

button{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#dce6f5;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#sonuc{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="form-container">

<h1>+60 Yaş Yaşlanma Kulübü</h1>

<form id="form">

<label>TC Kimlik Numaranız</label>
<input type="text" name="tc" maxlength="11" required>

<label>Telefon Numaranız</label>
<input type="tel" name="telefon" required>

<label>Adresiniz</label>
<input type="text" name="adres" required>

<label>Adınız ve Soyadınız</label>
<input type="text" name="isim" required>

<label>Doğum Tarihi</label>
<input type="date" name="dogum" required>

<label>Cinsiyet</label>
<select name="cinsiyet" required>
<option value="erkek">Erkek</option>
<option value="kadin">Kadın</option>
  
</select>

<label>Mesleğiniz</label>
<input type="text" name="meslek" required>

<button type="submit">Kayıt Ol</button>

</form>

<p id="sonuc"></p>

</div>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const data = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbzKdkDdDm8uT1ryHmsHDeOxuD25Q7e35rG3RZfFPw10UbG4lLTr7SS5NfoOb7cCUSnTug/exec", {
    method: "POST",
    body: data
  })
  .then(res => res.text())
  .then(data => {
    alert("Kayıt başarılı");
    form.reset();
  });
});
</script>

</body>
</html>
